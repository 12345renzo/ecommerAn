<div class="sticky top-0 z-40 glass border-b border-white/10">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="hidden md:flex items-center justify-between h-20">

          <button [routerLink]="'/'" class="flex items-center gap-2 shrink-0 cursor-pointer">
            <img src="/logo.png" alt="Logo de la Empresa" class=" w-32 h-fit object-cover" />
          </button>

          <div class="flex-1 max-w-md mx-8">
            <div class="relative">
              <svg lucideSearch class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground" ></svg>
              <input
                type="search"
                placeholder="Search products..."
                class="pl-10 glass border-white/20 icon-neumorphic focus:border-primary/50 bg-white/30 dark:bg-white/5 rounded-2xl h-10 w-full"
              />
            </div>
          </div>

          <nav class="hidden lg:flex items-center gap-8">
            <button [routerLink]="'/catalogo'" class="cursor-pointer text-md font-mono font-bold hover:text-primary transition-colors">
              Catalog
            </button>
            <button [routerLink]="'/collections'" class="cursor-pointer text-md font-mono font-bold hover:text-primary transition-colors">
              Collections
            </button>
            <button [routerLink]="'/about'" class="cursor-pointer text-md font-mono font-bold hover:text-primary transition-colors">
              About
            </button>
          </nav>

          <div class="flex items-center gap-4 ml-8">
            <button [routerLink]="'/auth/login'" class="icon-neumorphic cursor-pointer" aria-label="Account">
              <svg lucideUser class="w-5 h-5"></svg>
            </button>
            <button href="/cart" class="icon-neumorphic relative cursor-pointer" aria-label="Cart">
              <svg lucideShoppingCart class="w-5 h-5"></svg>
              <span class="absolute top-1 right-1 w-2 h-2 bg-primary rounded-full"></span>
            </button>
          </div>
        </div>
      </div>
    </div>
